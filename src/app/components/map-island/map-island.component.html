@if (content(); as island) {
  @switch (island.kind) {
    @case ("filter") {
      <div
        class="map-island glass d-flex flex-row align-items-center ps-4 gap-3 p-3"
      >
        <span class="mat-title-small">{{ island.message }}</span>
        <button
          type="button"
          class="flex-shrink-0"
          matButton="outlined"
          (click)="onClearFilter()"
        >
          <mat-icon>filter_alt_off</mat-icon>
          <span i18n="@@filter_clear">Clear</span>
        </button>
      </div>
    }

    @case ("event") {
      <div
        class="map-island event-island glass d-flex flex-row align-items-center gap-2 p-1 ps-2"
        [class.event-island-live]="eventStatus() === 'live'"
      >
        @if (island.event.effectiveBadgeLogoSrc(); as logoSrc) {
          <div
            class="island-logo flex-shrink-0"
            [style.background-color]="island.event.effectiveBadgeLogoBackgroundColor() ?? null"
          >
            <img [src]="logoSrc" alt="" />
          </div>
        } @else {
          <mat-icon class="event-icon flex-shrink-0">event</mat-icon>
        }

        <button
          type="button"
          class="island-text bg-transparent border-0 p-0 text-start flex-grow-1 overflow-hidden"
          (click)="onOpenEvent()"
        >
          @if (eventStatus() === "live") {
            <div
              class="event-disclosure mat-label-small text-truncate"
              i18n="@@map_island.event_promoted_live"
            >
              Promoted live event
            </div>
          } @else {
            <div
              class="event-disclosure mat-label-small text-truncate"
              i18n="@@map_island.event_promoted_upcoming"
            >
              Promoted upcoming event
            </div>
          }
          <div class="mat-title-small text-truncate">
            {{ island.event.name }}
          </div>
          <div class="mat-label-small text-truncate opacity-75">
            {{ island.event.localityString }}
          </div>
        </button>

        <div class="island-actions d-flex flex-row gap-1">
          <button
            type="button"
            mat-flat-button
            color="primary"
            class="flex-shrink-0"
            (click)="onOpenEvent()"
          >
            <span i18n="@@map_island.event_open">Open</span>
          </button>

          <button
            type="button"
            mat-icon-button
            class="flex-shrink-0 d-flex"
            (click)="onDismissEvent()"
            aria-label="Dismiss event chip"
            i18n-aria-label
          >
            <mat-icon>close</mat-icon>
          </button>
        </div>
      </div>
    }

    @case ("community") {
      <div
        class="map-island glass d-flex flex-row align-items-center gap-3 p-2 ps-3"
      >
        <mat-icon class="flex-shrink-0" color="primary">groups</mat-icon>

        <button
          type="button"
          class="island-text bg-transparent border-0 p-0 text-start flex-grow-1 overflow-hidden"
          (click)="onOpenCommunity()"
        >
          <div class="mat-title-small text-truncate">
            {{ island.community.displayName }}
          </div>
          <div class="mat-label-small text-truncate opacity-75" i18n>
            Community
          </div>
        </button>

        <div class="island-actions d-flex flex-row gap-1">
          <button
            type="button"
            mat-flat-button
            color="primary"
            class="flex-shrink-0"
            (click)="onOpenCommunity()"
          >
            <span i18n="@@map_island.community_open">View</span>
          </button>

          <button
            type="button"
            mat-icon-button
            class="flex-shrink-0 d-flex"
            (click)="onDismissCommunity()"
            aria-label="Dismiss community chip"
            i18n-aria-label
          >
            <mat-icon>close</mat-icon>
          </button>
        </div>
      </div>
    }
  }
}
