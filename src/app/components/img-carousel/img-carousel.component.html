<div
  #previewViewport
  class="carousel"
  [style.padding-left]="horizontalPaddingPx() + 'px'"
  [style.padding-right]="horizontalPaddingPx() + 'px'"
  [style.--contained-image-background]="containedImageBackground()"
>
  <div class="carousel-visual-layer">
    @for (mediaObj of media(); track $index) {
      @if (
        mediaObj.type === "image" &&
        !hiddenIndices().has($index) &&
        !mediaObj.isReported
      ) {
        <div
          class="spot-img-container"
          [class.contained-preview]="isContainedImage($index)"
          [style.aspect-ratio]="getImageAspectRatio($index)"
          [attr.data-media-index]="$index"
        >
          <div class="spot-img-frame">
            @if (
              !imageLoadErrors().has($index) && getImageSrc($index, mediaObj)
            ) {
              <img
                [ngSrc]="getImageSrc($index, mediaObj)"
                fill
                [priority]="$index === 0"
                [attr.referrerpolicy]="getReferrerPolicyForMedia(mediaObj)"
                (error)="onImageError($event, $index, mediaObj)"
                (load)="onImageLoad($event, $index, mediaObj)"
                [class.hidden]="isImageProcessing($index, mediaObj)"
              />
            }
          </div>

          @if (isImageProcessing($index, mediaObj)) {
            <!-- Show processing placeholder while resized image isn't ready -->
            <div class="processing-overlay">
              <mat-spinner diameter="40"></mat-spinner>
            </div>
          }
        </div>
      }
    }
  </div>

  <div
    #previewScroller
    class="carousel-scroll-layer"
    (click)="onPreviewClick($event)"
    (pointercancel)="onPreviewPointerEnd($event)"
    (pointerdown)="onPreviewPointerDown($event)"
    (pointermove)="onPreviewPointerMove($event)"
    (pointerup)="onPreviewPointerEnd($event)"
    (scroll)="onPreviewScroll()"
  >
    <div
      class="carousel-scroll-track"
      [style.width.px]="previewTrackWidth()"
    ></div>
  </div>
</div>
