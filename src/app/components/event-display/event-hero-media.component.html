<section class="event-hero-media" [class.contain]="event().bannerFit === 'contain'">
  @if (heroMedia().length) {
    <app-img-carousel
      [media]="heroMedia()"
      reportContext="event"
      [reportTargetId]="event().id"
      [imageFits]="imageFits()"
      [imageBackgroundColors]="imageBackgroundColors()"
    ></app-img-carousel>
  } @else {
    <app-media-placeholder
      [src]="null"
      variant="event"
      [label]="event().name"
    ></app-media-placeholder>
  }
</section>
