<div
  #smallDot
  class="small-dot-marker"
  [class.marker-primary-dark]="resolvedDarkMode()"
  [class.marker-primary-light]="!resolvedDarkMode()"
  [style.height.px]="dotSize()"
  [style.width.px]="dotSize()"
></div>

<map-advanced-marker
  [position]="position()"
  [content]="smallDot"
  [options]="markerOptions"
  (mapClick)="markerClick.emit(dot())"
  [zIndex]="dot().weight"
></map-advanced-marker>
